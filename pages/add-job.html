<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../styles/add-job.css">
</head>
<body>

<form method="post" onsubmit="return validateForm(event)">
    <h2 style = "text-align: center; color: rgba(45, 167, 201, 0.89); font-weight: 500;  border-bottom: 2px solid #e9ecef; padding-bottom: 1rem;">Add Job</h2>
    <label for="jobTitle">Job Title: <span style="color: red;">*</span></label><br>
    <input type="text" id="jobTitle" name="jobTitle" placeholder="Please Enter your job title" style="width: 250px; height: 20px;"><br><br>

    <label for="company">Company Name: <span style="color: red;">*</span></label><br>
    <input type="text" id="company" name="company" placeholder="Please Enter company name" style="width: 250px; height: 20px;"><br><br>

    <label for="location">Location: <span style="color: red;">*</span></label><br>
    <input type="text" id="location" name="location" placeholder="Please Enter location" style="width: 250px; height: 20px;"><br><br>

    <label for="salary">Salary: <span style="color: red;">*</span></label><br>
    <input type="text" id="salary" name="salary" placeholder="Please Enter salary" style="width: 250px; height: 20px;"><br><br>

    <label for="status">Status:</label><br>
    <select  name="status" style="width: 250px; height: 30px;">
        <option value="open">Open</option>
        <option value="closed">Closed</option>
    </select><br><br>

    <label for="description">Description:</label><br>
    <textarea id="description" name="description" placeholder="Please Enter job description" style="width: 250px; height: 100px;"></textarea><br><br>

    <input type="submit" value="Submit" >
</form>

<script src="../scripts/add-job.js"></script>

</body>
</html>
