<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="../styles/sign-up.css">

</head>


<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <span class="logo"><a href="../home.html">LinkedOn</a></span>
                <div class="nav-links">


                </div>
            </div>
            <div class="nav-right">
                <button class="btn-login"><a href="sign-in.html">Login</a></button>
                <button class="btn-signup"> <a href="sign-up.html">Sign Up</a> </button>
            </div>
        </div>
    </nav>


    <form>
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password" required><br><br>


        <label for="confirm-password">Confirm Password:</label><br>
        <input type="password" id="confirm-password" name="confirm-password" required><br><br>

        <button type="button" id="toggleBothPw">👁</button>


        <label>Sign up as:</label><br>
        <input type="radio" id="user" name="role" value="user" required>
        <label for="user">User</label><br>

        <input type="radio" id="admin" name="role" value="admin" required>
        <label for="admin">Admin</label><br><br>

        <label for="phone">Phone Number:</label><br>
        <input type="phone" id="phone" name="phone" pattern="[0-9]+" required>

        <div id="companyInput">
            <label for="company">Company Name:</label><br>
            <input type="text" id="company" name="company"><br><br>
        </div>

        <button type="submit">Sign Up</button>

    </form>
    <script src="../scripts/sign-up.js"></script>
</body>
