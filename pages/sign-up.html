<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Sign Up</title> 

</head>
<body style="background-color: aliceblue;">
        <img src="/Users/alitarek44/Desktop/Web-Assignment/Web-Technology-Assignment/images/Icon.png" alt="" style="float:inline-start; height:200px; width: 200px;">
        <h1 style="text-align: center;"> <br><br><br><br><br><br> Sign Up </h1>
        
        <form style="text-align:center;">
        
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required><br><br>
            <label for="password">Password:</label><br>
            <input type="password" id="password" name="password" required><br><br>
            <label for="confirm-password">Confirm Password:</label><br>
            <input type="password" id="confirm-password" name="confirm-password" required><br><br>
            <label>Sign up as:</label><br>
        <input type="radio" id="user" name="role" value="user" required>
        <label for="user">User</label><br>
        
        <input type="radio" id="admin" name="role" value="admin" required>
        <label for="admin">Admin</label><br><br>
        
        
        <div id="companyInput">
            <label for="company">Company Name:</label><br>
            <input type="text" id="company" name="company"><br><br>
        </div>
            
           
            <button type="submit">Sign Up</button>
        </form>
</body>
</html>
