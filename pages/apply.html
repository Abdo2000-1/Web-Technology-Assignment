<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for Job</title>
    <link rel="stylesheet" href="../styles/apply.css">
</head>

<body style="font-family: Arial; background:#f5f7fa; margin:0;">

<nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <span class="logo"><a href="../home.html">LinkedOn</a></span>
                <div class="nav-links">
                    <a class="nav-link" href="../home.html">Home</a>
                    <a class="nav-link" href="search.html">Search</a> 
                    <a class="nav-link" href="view-list.html">View List</a>
                    <a class="nav-link active" href="apply.html">Apply</a>
                    <a class="nav-link" href="applied-jobs.html">My Apps</a>
                </div>
            </div>
            <div class="nav-right">
                <button class="btn-login"><a href="sign-in.html">Login</a></button>
                <button class="btn-signup"> <a href="sign-up.html">Sign Up</a> </button>
            </div>
        </div>
    </nav>


    <div class="container">
        <h2>Apply for Job</h2>

        <form id="job-form" novalidate>
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your full name">
                <div class="error-msg" id="name-error">Full name is required.</div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com">
                <div class="error-msg" id="email-error">Please enter a valid email address.</div>
            </div>

            <div class="form-group">
                <label for="jobTitle">Select Job</label>
                <select id="jobTitle">
                    <option value="" disabled selected>-- Select a Position --</option>
                    <option value="Software Engineer">Software Engineer</option>
                    <option value="Data Analyst">Data Analyst</option>
                    <option value="UI/UX Designer">UI/UX Designer</option>
                    <option value="Project Manager">Project Manager</option>
                    <option value="Marketing Specialist">Marketing Specialist</option>
                </select>
                <div class="error-msg" id="job-error">Please select a job position.</div>
            </div>

            <div class="form-group">
                <label for="experience">Years of Experience</label>
                <input type="number" id="experience" min="0" placeholder="e.g. 2">
                <div class="error-msg" id="exp-error">Please enter valid years of experience.</div>
            </div>

            <div class="form-group">
                <label for="coverLetter">Cover Letter</label>
                <textarea id="coverLetter" rows="4" placeholder="Briefly describe why you are a good fit..."></textarea>
            </div>


            <div class="upload-box" id="uploadBox">
                <label for="fileInput">Upload Resume</label>
                <p>Click to upload or drag and drop <small><ins>(PDF, DOCX up to 10MB)</ins></small></p>
                

                <input type="file" id="fileInput" accept=".pdf,.doc,.docx">
            </div>
            <div class="error-msg" id="file-error">Please upload your resume.</div>

            <button type="submit" class="submit-btn">Submit Application</button>
        </form>
    </div>

    <div class="error-msg" id="name-error">Full name is required</div>

    <script src="../scripts/apply.js"></script>

</body>

</html>
